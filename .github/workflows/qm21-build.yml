name: QM21 quantitative evidence build

on:
  push:
    branches:
      - artifact/qm21-20260713-v2
    paths:
      - 'qm21/**'
      - '.github/workflows/qm21-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'qm21/**'
      - '.github/workflows/qm21-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install exact dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet numpy==2.2.6 pandas==2.2.3 matplotlib==3.10.3

      - name: Build QM21 deliverable
        env:
          PYTHONHASHSEED: '0'
          MPLBACKEND: Agg
        shell: bash
        run: |
          set -o pipefail
          python qm21/run_build.py 2>&1 | tee qm21-build.log

      - name: Run contract tests
        env:
          PYTHONHASHSEED: '0'
          MPLBACKEND: Agg
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s qm21/tests -v 2>&1 | tee qm21-test.log

      - name: Print delivery receipt
        run: |
          cat qm21/build/QM21_DELIVERY_RECEIPT.json
          cat qm21/build/FINAL_QM21.sha256

      - name: Upload verified delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM21_ACTION_ARTIFACT
          path: |
            qm21/build/FINAL_QM21.zip
            qm21/build/FINAL_QM21.sha256
            qm21/build/QM21_DELIVERY_RECEIPT.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 90

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QM21_DIAGNOSTICS
          path: |
            qm21-build.log
            qm21-test.log
          if-no-files-found: warn
          retention-days: 30

      - name: Post diagnostic trace to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '### QM21 build diagnostic\n\n```text\n' > qm21-comment.md
          cat qm21-build.log >> qm21-comment.md
          printf '\n```\n' >> qm21-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file qm21-comment.md
