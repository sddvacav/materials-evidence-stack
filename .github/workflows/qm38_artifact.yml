name: QM38 hierarchical meta artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm38_remote/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: qm38_remote/requirements-ci.txt
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r qm38_remote/requirements-ci.txt
      - name: Build deterministic QM38 package
        run: python qm38_remote/build_qm38.py
      - name: Run package acceptance tests
        run: python qm38_remote/output/FINAL_QM38/tests/test_qm38_outputs.py qm38_remote/output/FINAL_QM38
      - name: Upload FINAL_QM38
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM38
          path: qm38_remote/output/FINAL_QM38/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
