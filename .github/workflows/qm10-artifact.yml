name: QM10 evidence artifact

on:
  push:
    branches:
      - artifact/qm10-20260713
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: artifact/qm10-20260713
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib==3.10.3 Pillow==11.3.0 PyMuPDF==1.26.3
      - name: Generate with persistent diagnostics
        shell: bash
        run: |
          set +e
          python qm10/run_qm10.py 2>&1 | tee QM10_BUILD.log
          rc=${PIPESTATUS[0]}
          echo "$rc" > QM10_BUILD.exit
          exit 0
      - name: Commit diagnostic and immutable return
        run: |
          git config user.name "chatgpt-web-fleet-bot"
          git config user.email "chatgpt-web-fleet-bot@users.noreply.github.com"
          git add -f QM10_BUILD.log QM10_BUILD.exit
          test ! -f deliverables/FINAL_QM10.zip || git add -f deliverables/FINAL_QM10.zip deliverables/FINAL_QM10.sha256 deliverables/QM10_SUMMARY.md
          if git diff --cached --quiet; then
            echo "No artifact delta"
          else
            git commit -m "artifact: QM10 diagnostic/return [skip ci]"
            git push origin HEAD:artifact/qm10-20260713
          fi
      - name: Enforce successful generation
        run: test "$(cat QM10_BUILD.exit)" -eq 0
      - name: Independent acceptance
        run: |
          unzip -t deliverables/FINAL_QM10.zip
          (cd deliverables && sha256sum -c FINAL_QM10.sha256)
          test "$(find FINAL_QM10/figures -name '*.png' | wc -l)" -eq 6
          test "$(find FINAL_QM10/figures -name '*.pdf' | wc -l)" -eq 6
          test "$(find FINAL_QM10/figures -name '*.svg' | wc -l)" -eq 6
      - uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM10
          path: |
            deliverables/FINAL_QM10.zip
            deliverables/FINAL_QM10.sha256
            deliverables/QM10_SUMMARY.md
            QM10_BUILD.log
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
