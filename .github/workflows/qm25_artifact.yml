name: QM25 artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm25_remote/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
      - name: Install pinned runtime
        run: python -m pip install -r qm25_remote/requirements-ci.txt
      - name: Build QM25 package
        run: python qm25_remote/build_qm25.py
      - name: Test QM25 package
        run: python qm25_remote/output/FINAL_QM25/tests/test_outputs.py qm25_remote/output/FINAL_QM25
      - name: Upload FINAL_QM25
        id: upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM25
          path: qm25_remote/output/FINAL_QM25/
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
      - name: Print artifact digest
        run: echo "ARTIFACT_DIGEST=${{ steps.upload.outputs.artifact-digest }}"
