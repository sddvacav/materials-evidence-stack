name: G06 UQ OOD AD FINAL artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'g06_remote/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.12'
      - name: Build, test and package G06 return
        id: build
        shell: bash
        run: |
          set +e
          python -m py_compile g06_remote/build_g06_final.py > g06_build.log 2>&1
          code=$?
          if [ "$code" = "0" ]; then
            python g06_remote/build_g06_final.py >> g06_build.log 2>&1
            code=$?
          fi
          cat g06_build.log
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish build diagnostic to PR
        if: steps.build.outputs.code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'G06 build diagnostic:\n\n```text\n%s\n```\n' "$(tail -c 30000 g06_build.log)" > g06_comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file g06_comment.md
      - name: Fail after diagnostic
        if: steps.build.outputs.code != '0'
        run: exit 1
      - name: Verify ZIP
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib, zipfile
          p=Path('g06_remote/out/TIAI_G06_UQ_OOD_AD_REJECT_RETURN_20260718_FINAL.zip')
          assert p.is_file()
          with zipfile.ZipFile(p) as z:
              assert z.testzip() is None
              assert len(z.namelist()) >= 20
          print(hashlib.sha256(p.read_bytes()).hexdigest(), p)
          PY
      - name: Upload FINAL
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: TIAI_G06_UQ_OOD_AD_REJECT_RETURN_20260718_FINAL
          path: g06_remote/out/TIAI_G06_UQ_OOD_AD_REJECT_RETURN_20260718_FINAL.zip
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
      - name: Publish validated ZIP to output branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin g06-output-20260718 >/dev/null 2>&1; then
            git clone --depth 1 --branch g06-output-20260718 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/g06_output
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/g06_output
            cd /tmp/g06_output
            git switch --orphan g06-output-20260718
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p /tmp/g06_output/artifacts/G06
          cp "$GITHUB_WORKSPACE/g06_remote/out/TIAI_G06_UQ_OOD_AD_REJECT_RETURN_20260718_FINAL.zip" /tmp/g06_output/artifacts/G06/
          cd /tmp/g06_output
          git config user.name 'g06-artifact-bot'
          git config user.email 'g06-artifact-bot@users.noreply.github.com'
          git add artifacts/G06
          git commit -m 'Publish validated G06 FINAL artifact'
          git push origin HEAD:g06-output-20260718
