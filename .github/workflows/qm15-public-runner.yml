name: QM15 evidence artifact runner

on:
  pull_request:
    branches: [main]
    paths:
      - jobs/qm15/**
      - .github/workflows/qm15-public-runner.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build-qm15:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone pull-request head
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "${GITHUB_HEAD_REF}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git rev-parse HEAD

      - name: Install exact plotting dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --user --no-cache-dir matplotlib==3.9.2 numpy==2.1.1

      - name: Build and validate QM15
        shell: bash
        run: |
          set -euo pipefail
          cd jobs/qm15
          python3 - <<'PY'
          from pathlib import Path
          p=Path('build.py')
          s=p.read_text(encoding='utf-8')
          old='"plot_thermal_exposure_retention.py": common +'
          new='"plot_thermal_exposure_retention_timeline.py": common +'
          if old not in s:
              raise SystemExit('expected plot-key patch anchor missing')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
          if ! python3 build.py > build.log 2>&1; then
            tail -n 250 build.log
            if [ -f FINAL_QM15/tests/test_qm15_outputs.py ]; then
              python3 FINAL_QM15/tests/test_qm15_outputs.py || true
            fi
            exit 1
          fi
          cat build.log
          test -d FINAL_QM15
          python3 FINAL_QM15/analysis_code/validate_package.py

      - name: Upload FINAL_QM15 as a non-nested ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: FINAL_QM15
          path: jobs/qm15/FINAL_QM15/**
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          include-hidden-files: true
