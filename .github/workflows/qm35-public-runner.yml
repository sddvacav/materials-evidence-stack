name: QM35 mechanism-budget artifact runner

on:
  pull_request:
    branches: [main]
    paths:
      - jobs/qm35/**
      - .github/workflows/qm35-public-runner.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build-qm35:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone pull-request head
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "${GITHUB_HEAD_REF}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git rev-parse HEAD

      - name: Install exact dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user --no-cache-dir \
            numpy==2.2.6 pandas==2.3.0 matplotlib==3.10.3 \
            pypdf==5.7.0 pytest==8.4.1

      - name: Build and validate QM35
        shell: bash
        run: |
          set -euo pipefail
          cd jobs/qm35
          python3 build.py | tee build.log
          test -d FINAL_QM35
          python3 FINAL_QM35/analysis_code/recompute_qm35.py
          python3 FINAL_QM35/analysis_code/validate_package.py
          python3 -m pytest -q FINAL_QM35/tests

      - name: Upload FINAL_QM35 as non-nested artifact ZIP
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: FINAL_QM35
          path: jobs/qm35/FINAL_QM35/**
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
          include-hidden-files: true
