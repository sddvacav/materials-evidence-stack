name: QM11 Artifact Build

on:
  pull_request:
    branches: [main]
    paths:
      - "qm11_web_return/**"
      - ".github/workflows/qm11_artifact_build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependency
        run: python -m pip install "matplotlib>=3.9,<4"
      - name: Build
        run: python qm11_web_return/build_qm11.py
      - name: Validate
        run: |
          set -euo pipefail
          cd FINAL_QM11
          python analysis_code/recompute_qm11.py
          test -z "$(find . -name '*.zip' -print -quit)"
          test "$(find figures -type f | wc -l)" -eq 15
          test "$(find figure_data -name '*.csv' -type f | wc -l)" -eq 5
          test "$(find plot_code -name '*.py' -type f | wc -l)" -eq 5
          python -c 'import json; s=json.load(open("WINDOW_STATUS.json",encoding="utf-8")); assert s["window_id"]=="QM11" and s["status"]=="CONTINUE_DATA_GAP" and s["claim_level_max"]<=2; print(json.dumps(s,ensure_ascii=False,sort_keys=True))'
          sha256sum -c CHECKSUMS.sha256
      - name: Upload FINAL_QM11
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM11
          path: FINAL_QM11/
          if-no-files-found: error
          compression-level: 9
          retention-days: 30
