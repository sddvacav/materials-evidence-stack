name: QM36 artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm36_remote/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: qm36_remote/requirements-ci.txt
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r qm36_remote/requirements-ci.txt
      - name: Build deterministic QM36 package
        run: python qm36_remote/build_qm36.py
      - name: Run package acceptance tests
        run: python qm36_remote/output/FINAL_QM36/tests/test_qm36_outputs.py qm36_remote/output/FINAL_QM36
      - name: Upload FINAL_QM36
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM36
          path: qm36_remote/output/FINAL_QM36/
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
