name: QM14 direct package

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/qm14_direct_package.yml'

permissions:
  contents: read

jobs:
  build-direct-package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
      - name: Install pinned runtime
        run: python -m pip install --disable-pip-version-check -r qm14_remote/requirements-ci.txt
      - name: Build corrected QM14 package
        run: python qm14_remote/fix_and_run.py
      - name: Independently rerun package tests
        run: python qm14_remote/output/FINAL_QM14_REBUILT/tests/test_outputs.py qm14_remote/output/FINAL_QM14_REBUILT
      - name: Assert direct package contains no nested archive
        run: |
          if find qm14_remote/output/FINAL_QM14_REBUILT -type f \( -iname '*.zip' -o -iname '*.7z' -o -iname '*.rar' \) | grep -q .; then
            echo 'Nested archive detected' >&2
            exit 1
          fi
      - name: Upload direct package tree
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM14_REBUILT_DIRECT
          path: qm14_remote/output/FINAL_QM14_REBUILT/**
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
