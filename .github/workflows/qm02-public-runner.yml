name: QM02 evidence artifact runner

on:
  pull_request:
    branches: [main]
    paths:
      - jobs/qm02/**
      - .github/workflows/qm02-public-runner.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build-qm02:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone pull-request head
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "${GITHUB_HEAD_REF}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git rev-parse HEAD

      - name: Install exact plotting dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user --no-cache-dir matplotlib==3.9.2 numpy==2.1.1

      - name: Build, apply visual QA patch and validate QM02
        shell: bash
        run: |
          set -euo pipefail
          cd jobs/qm02
          python3 build.py | tee build.log
          test -d FINAL_QM02
          if [ -f patch_after_build.py ]; then
            python3 patch_after_build.py | tee patch_after_build.log
          fi
          python3 FINAL_QM02/analysis_code/validate_package.py

      - name: Upload FINAL_QM02 as a non-nested ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: FINAL_QM02
          path: jobs/qm02/FINAL_QM02/**
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          include-hidden-files: true
