name: QM34 CTE-GND quantitative artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm34_remote/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: qm34_remote/requirements-ci.txt
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r qm34_remote/requirements-ci.txt
      - name: Compile and build deterministic QM34 package
        id: build
        shell: bash
        run: |
          set +e
          python -m py_compile qm34_remote/build_qm34.py qm34_remote/plot_all.py qm34_remote/recompute_qm34.py qm34_remote/test_qm34_outputs.py > qm34_build.log 2>&1
          code=$?
          if [ "$code" = "0" ]; then
            python qm34_remote/build_qm34.py >> qm34_build.log 2>&1
            code=$?
          fi
          cat qm34_build.log
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish build diagnostic to PR
        if: steps.build.outputs.code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'QM34 build diagnostic:\n\n```text\n%s\n```\n' "$(tail -c 10000 qm34_build.log)" > qm34_comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file qm34_comment.md
      - name: Fail after diagnostic
        if: steps.build.outputs.code != '0'
        run: exit 1
      - name: Run package acceptance tests
        run: |
          python qm34_remote/output/FINAL_QM34/tests/test_qm34_outputs.py qm34_remote/output/FINAL_QM34
          python qm34_remote/output/FINAL_QM34/analysis_code/recompute_qm34.py qm34_remote/output/FINAL_QM34 | tee qm34_remote/output/FINAL_QM34/RECOMPUTE_OUTPUT.txt
          cd qm34_remote/output/FINAL_QM34
          sha256sum -c CHECKSUMS.sha256
      - name: Verify archive and create receipt
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib, json, zipfile
          p=Path('qm34_remote/output/FINAL_QM34.zip')
          with zipfile.ZipFile(p) as z:
              assert z.testzip() is None
              assert not [n for n in z.namelist() if n.lower().endswith('.zip')]
              entries=len(z.namelist())
          receipt={'window_id':'QM34','zip':'FINAL_QM34.zip','bytes':p.stat().st_size,'sha256':hashlib.sha256(p.read_bytes()).hexdigest(),'entries':entries,'testzip':'PASS','nested_zip':False}
          out=p.parent
          (out/'QM34_DELIVERY_RECEIPT.json').write_text(json.dumps(receipt,indent=2),encoding='utf-8')
          (out/'FINAL_QM34.zip.sha256').write_text(f"{receipt['sha256']}  FINAL_QM34.zip\n",encoding='utf-8')
          print(json.dumps(receipt,indent=2))
          PY
      - name: Upload FINAL_QM34
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM34
          path: |
            qm34_remote/output/FINAL_QM34.zip
            qm34_remote/output/QM34_DELIVERY_RECEIPT.json
            qm34_remote/output/FINAL_QM34.zip.sha256
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
      - name: Publish validated ZIP to immutable output branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch qm34-output-20260713 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/qm34_output
          mkdir -p /tmp/qm34_output/artifacts/QM34
          cp qm34_remote/output/FINAL_QM34.zip /tmp/qm34_output/artifacts/QM34/
          cp qm34_remote/output/QM34_DELIVERY_RECEIPT.json /tmp/qm34_output/artifacts/QM34/
          cp qm34_remote/output/FINAL_QM34.zip.sha256 /tmp/qm34_output/artifacts/QM34/
          cd /tmp/qm34_output
          git config user.name 'qm34-artifact-bot'
          git config user.email 'qm34-artifact-bot@users.noreply.github.com'
          git add artifacts/QM34
          git commit -m 'Publish validated FINAL_QM34 artifact'
          git push origin HEAD:qm34-output-20260713
