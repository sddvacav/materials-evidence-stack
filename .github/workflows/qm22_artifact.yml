name: QM22 artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm22_remote/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r qm22_remote/requirements-ci.txt
      - name: Build FINAL_QM22
        run: python qm22_remote/build_qm22.py
      - name: Repair acceptance anchor and reseal
        run: python qm22_remote/postfix_qm22.py
      - name: Run acceptance tests
        run: python qm22_remote/output/FINAL_QM22/tests/test_qm22_outputs.py qm22_remote/output/FINAL_QM22
      - name: Independent recomputation
        run: python qm22_remote/output/FINAL_QM22/analysis_code/recompute_qm22.py --base qm22_remote/output/FINAL_QM22 --check-only
      - name: Upload FINAL_QM22
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM22
          path: |
            qm22_remote/output/FINAL_QM22.zip
            qm22_remote/output/FINAL_QM22.sha256
            qm22_remote/output/DELIVERY_RECEIPT.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
