name: QM20 deterministic evidence build
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build-qm20:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.11'
      - name: Install exact dependencies
        run: |
          python -m pip install --upgrade pip==24.3.1
          python -m pip install matplotlib==3.9.2 numpy==2.1.3 pandas==2.2.3 pytest==8.3.4 scipy==1.14.1
      - name: Build all QM20 outputs
        run: python qm20_builder.py
      - name: Independent checksum and effect recomputation
        run: python FINAL_QM20/analysis_code/recompute_qm20.py --base FINAL_QM20 --check-only
      - name: Independent package tests
        run: python -m pytest -q FINAL_QM20/tests
      - name: Inspect terminal package
        run: |
          find FINAL_QM20 -type f -printf '%P\n' | sort
          test ! -n "$(find FINAL_QM20 -type f -name '*.zip' -print -quit)"
      - name: Upload FINAL_QM20 package
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: FINAL_QM20
          path: FINAL_QM20/**
          if-no-files-found: error
          compression-level: 9
          retention-days: 7
