name: QM28 Artifact Build

on:
  push:
    branches:
      - qm28-artifact-build-20260713
    paths:
      - 'artifacts/qm28/**'
      - '.github/workflows/qm28-artifact-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'artifacts/qm28/**'
      - '.github/workflows/qm28-artifact-build.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONHASHSEED: '0'
  MPLBACKEND: Agg

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install plotting dependency
        run: python -m pip install --disable-pip-version-check matplotlib==3.10.3
      - name: Build package
        run: python artifacts/qm28/build_qm28.py
      - name: Validate generated canonical ZIP
        run: |
          cat artifacts/qm28/build/FINAL_QM28.sha256
          unzip -t artifacts/qm28/build/FINAL_QM28.zip
          test -z "$(find artifacts/qm28/build/FINAL_QM28 -type f -name '*.zip' -print -quit)"
      - name: Upload direct non-nested package
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM28_DIRECT
          path: artifacts/qm28/build/FINAL_QM28
          compression-level: 6
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30
