name: QM20 artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm20_remote/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
      - name: Install pinned runtime
        run: python -m pip install -r qm20_remote/requirements-ci.txt
      - name: Build QM20 package
        run: python qm20_remote/build_qm20.py
      - name: Test QM20 package
        run: python qm20_remote/output/FINAL_QM20/tests/test_outputs.py qm20_remote/output/FINAL_QM20
      - name: Upload FINAL_QM20
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM20
          path: qm20_remote/output/FINAL_QM20/
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
