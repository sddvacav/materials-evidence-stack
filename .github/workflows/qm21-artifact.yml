name: QM21 Artifact Build

on:
  pull_request:
    branches: [main]
    paths:
      - "qm21/**"
      - ".github/workflows/qm21-artifact.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: qm21/requirements-build.txt
      - name: Install pinned dependencies
        run: python -m pip install --disable-pip-version-check -r qm21/requirements-build.txt
      - name: Build FINAL_QM21
        run: python qm21/build_qm21.py
      - name: Verify package tests
        run: python -m unittest discover -s qm21/generated/FINAL_QM21/tests -v
      - name: Show build summary
        run: cat qm21/generated/build_summary.json
      - name: Publish direct-download files on artifact branch
        run: |
          mkdir -p delivery/qm21
          cp qm21/generated/FINAL_QM21.zip delivery/qm21/FINAL_QM21.zip
          cp qm21/generated/FINAL_QM21.sha256 delivery/qm21/FINAL_QM21.sha256
          cp qm21/generated/build_summary.json delivery/qm21/build_summary.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f delivery/qm21/FINAL_QM21.zip delivery/qm21/FINAL_QM21.sha256 delivery/qm21/build_summary.json
          git commit -m "artifact: publish validated FINAL_QM21" || true
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM21
          path: |
            qm21/generated/FINAL_QM21.zip
            qm21/generated/FINAL_QM21.sha256
            qm21/generated/build_summary.json
          if-no-files-found: error
          retention-days: 7
