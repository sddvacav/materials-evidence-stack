name: QM30 defect penalty quantitative artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'qm30_remote/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: qm30_remote/requirements-ci.txt
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r qm30_remote/requirements-ci.txt
      - name: Build deterministic QM30 package
        run: python qm30_remote/build_qm30.py
      - name: Run package acceptance tests
        run: python qm30_remote/output/FINAL_QM30/tests/test_qm30_outputs.py qm30_remote/output/FINAL_QM30
      - name: Upload FINAL_QM30
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: FINAL_QM30
          path: qm30_remote/output/FINAL_QM30/
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
