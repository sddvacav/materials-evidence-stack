name: G11 TabPFN overnight FINAL artifact build

on:
  pull_request:
    branches: [main]
    paths:
      - 'g11_remote/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: g11_remote/requirements-ci.txt
      - name: Install pinned runtime
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install -r g11_remote/requirements-ci.txt
      - name: Build, test and package G11 return
        id: build
        shell: bash
        run: |
          set +e
          python -m py_compile g11_remote/build_g11.py > g11_build.log 2>&1
          code=$?
          if [ "$code" = "0" ]; then
            python g11_remote/build_g11.py >> g11_build.log 2>&1
            code=$?
          fi
          cat g11_build.log
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish build diagnostic to PR
        if: steps.build.outputs.code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'G11 build diagnostic:\n\n```text\n%s\n```\n' "$(tail -c 20000 g11_build.log)" > g11_comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file g11_comment.md
      - name: Fail after diagnostic
        if: steps.build.outputs.code != '0'
        run: exit 1
      - name: Verify archive and checksums
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib, json, zipfile
          p=Path('g11_remote/output/TIAI_G11_TABPFN_OVERNIGHT_WEB99_FINAL_20260718.zip')
          with zipfile.ZipFile(p) as z:
              assert z.testzip() is None
              assert not [n for n in z.namelist() if n.lower().endswith('.zip')]
              entries=len(z.namelist())
          receipt=json.loads(Path('g11_remote/output/G11_DELIVERY_RECEIPT.json').read_text())
          assert receipt['zip_sha256']==hashlib.sha256(p.read_bytes()).hexdigest()
          assert receipt['entries']==entries
          print(json.dumps(receipt,indent=2))
          PY
      - name: Upload FINAL
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: TIAI_G11_TABPFN_OVERNIGHT_WEB99_FINAL_20260718
          path: |
            g11_remote/output/TIAI_G11_TABPFN_OVERNIGHT_WEB99_FINAL_20260718.zip
            g11_remote/output/TIAI_G11_TABPFN_OVERNIGHT_WEB99_FINAL_20260718.zip.sha256
            g11_remote/output/G11_DELIVERY_RECEIPT.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
      - name: Publish validated ZIP to output branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch g11-output-20260718 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/g11_output
          mkdir -p /tmp/g11_output/artifacts/G11
          cp g11_remote/output/TIAI_G11_TABPFN_OVERNIGHT_WEB99_FINAL_20260718.zip /tmp/g11_output/artifacts/G11/
          cp g11_remote/output/TIAI_G11_TABPFN_OVERNIGHT_WEB99_FINAL_20260718.zip.sha256 /tmp/g11_output/artifacts/G11/
          cp g11_remote/output/G11_DELIVERY_RECEIPT.json /tmp/g11_output/artifacts/G11/
          cd /tmp/g11_output
          git config user.name 'g11-artifact-bot'
          git config user.email 'g11-artifact-bot@users.noreply.github.com'
          git add artifacts/G11
          git commit -m 'Publish validated G11 FINAL artifact'
          git push origin HEAD:g11-output-20260718
