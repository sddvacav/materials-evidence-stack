name: XW08 private read probe

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/xw08-private-read-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe same-owner private repository ref
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +x
          out="$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/sddvacav/tiai-full-state-private.git" refs/heads/v29x/xw08-properties-20260713 2>/dev/null || true)"
          if [[ -n "$out" ]]; then
            echo 'PRIVATE_CROSS_REPO_READ=true'
          else
            echo 'PRIVATE_CROSS_REPO_READ=false'
            exit 1
          fi
