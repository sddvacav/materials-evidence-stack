name: XW08 private read probe

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/xw08-private-read-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe authorized token candidates
        shell: bash
        env:
          DEFAULT_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          PAT: ${{ secrets.PAT }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          MATERIALS_EVIDENCE_PAT: ${{ secrets.MATERIALS_EVIDENCE_PAT }}
          TITMC_PAT: ${{ secrets.TITMC_PAT }}
          TIAI_PAT: ${{ secrets.TIAI_PAT }}
        run: |
          set +x
          success=''
          for name in DEFAULT_TOKEN GH_PAT GITHUB_PAT PAT REPO_TOKEN PRIVATE_REPO_PAT PERSONAL_ACCESS_TOKEN RELEASE_TOKEN MATERIALS_EVIDENCE_PAT TITMC_PAT TIAI_PAT; do
            token="${!name:-}"
            if [[ -z "$token" ]]; then
              echo "TOKEN_PROBE|${name}|UNSET_OR_WITHHELD"
              continue
            fi
            out="$(git ls-remote "https://x-access-token:${token}@github.com/sddvacav/tiai-full-state-private.git" refs/heads/v29x/xw08-properties-20260713 2>/dev/null || true)"
            if [[ -n "$out" ]]; then
              echo "TOKEN_PROBE|${name}|PRIVATE_READ_OK"
              success="$name"
              break
            else
              echo "TOKEN_PROBE|${name}|NO_PRIVATE_READ"
            fi
          done
          if [[ -z "$success" ]]; then
            exit 1
          fi
