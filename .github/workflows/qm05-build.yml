name: QM05 Build
on:
  pull_request:
    branches: [main]
    paths:
      - 'q40/QM05/**'
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --disable-pip-version-check matplotlib==3.10.3
      - run: python q40/QM05/build_qm05_artifact.py
      - run: python q40/QM05/artifact/validate_package.py q40/QM05/artifact
      - uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM05
          path: q40/QM05/artifact/*
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 90
