name: QM01 delivery

on:
  push:
    branches:
      - qm01-delivery-20260713
    paths:
      - qm01_delivery/TRIGGER
      - qm01_delivery/build_final_qm01.py
      - .github/workflows/qm01-delivery.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install exact environment
        run: |
          python -m pip install --upgrade pip==25.1.1
          python -m pip install pandas==2.2.3 numpy==2.1.3 matplotlib==3.9.2 pyarrow==18.1.0 pytest==8.3.4
      - name: Build QM01 package
        env:
          MPLBACKEND: Agg
          PYTHONHASHSEED: '0'
        run: |
          python -X utf8 qm01_delivery/build_final_qm01.py | tee qm01_delivery/build_receipt_stdout.json
      - name: Contract tests
        run: |
          python -m pytest -q qm01_delivery/FINAL_QM01/tests/test_contract.py
      - name: Archive integrity
        run: |
          python - <<'PY'
          import hashlib,json,pathlib,zipfile
          root=pathlib.Path('qm01_delivery')
          z=root/'FINAL_QM01.zip'
          with zipfile.ZipFile(z) as f:
              assert f.testzip() is None
              assert not any(x.lower().endswith('.zip') for x in f.namelist())
          h=hashlib.sha256(z.read_bytes()).hexdigest()
          declared=(root/'FINAL_QM01.zip.sha256').read_text().split()[0]
          assert h==declared
          s=json.loads((root/'FINAL_QM01/WINDOW_STATUS.json').read_text())
          assert s['status']=='CONTINUE_DATA_GAP'
          print('PASS',h)
          PY
      - name: Upload deliverable
        uses: actions/upload-artifact@v4
        with:
          name: FINAL_QM01
          path: |
            qm01_delivery/FINAL_QM01.zip
            qm01_delivery/FINAL_QM01.zip.sha256
            qm01_delivery/QM01_DELIVERY_RECEIPT.json
            qm01_delivery/build_receipt_stdout.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
